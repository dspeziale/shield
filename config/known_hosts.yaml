  - ip: 192.168.1.116
    mac: "14:49:d4:98:00:af"
    description: "Dispositivo LAN - da identificare"

  - ip: 192.168.1.189
    mac: "0c:82:68:e3:b9:be"
    description: "Dispositivo LAN - da identificare"

  # ── Come aggiungere nuovi host ────────────────────────────────
  # 1. Trova l'IP del dispositivo (router admin o arp -a)
  # 2. Ottieni il MAC: arp -a <IP>
  # 3. Aggiungi la voce e riavvia hermes-ids
  #
  # - ip: 192.168.1.x
  #   mac: "xx:xx:xx:xx:xx:xx"
  #   description: "Nome dispositivo"
