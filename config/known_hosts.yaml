  # oppure rimuovi quelli che non riconosci.
  - ip: 192.168.1.25
    mac: "3e:98:38:e0:ba:de"
    description: "Dispositivo LAN - da identificare"

  - ip: 192.168.1.79
    mac: "00:e0:4c:38:70:f2"
